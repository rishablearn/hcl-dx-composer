version: '3.8'

# SSL-enabled Docker Compose configuration
# Use with: docker-compose -f docker-compose.yml -f docker-compose-ssl.yml up -d

services:
  # Override frontend for SSL support
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.ssl
      args:
        VITE_API_BASE_URL: /api
    container_name: hcl-dx-frontend
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      APP_HOSTNAME: ${APP_HOSTNAME:-localhost}
      SSL_ENABLED: "true"
    ports:
      - "${FRONTEND_PORT:-3000}:80"
      - "${FRONTEND_SSL_PORT:-443}:443"
    volumes:
      # Mount SSL certificates - nginx expects them in /etc/nginx/ssl/
      - ./ssl/certs/server.crt:/etc/nginx/ssl/server.crt:ro
      - ./ssl/private/server.key:/etc/nginx/ssl/server.key:ro
      - certbot_webroot:/var/www/certbot:ro
    depends_on:
      - backend
    networks:
      - hcl-dx-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Certbot service for Let's Encrypt certificate renewal
  certbot:
    image: certbot/certbot
    container_name: hcl-dx-certbot
    volumes:
      - ./ssl/certs:/etc/letsencrypt/live/cert:rw
      - ./ssl/private:/etc/letsencrypt/archive:rw
      - certbot_webroot:/var/www/certbot:rw
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    profiles:
      - letsencrypt

volumes:
  certbot_webroot:
    driver: local
